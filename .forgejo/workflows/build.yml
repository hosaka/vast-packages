name: Build and publish packages

on:
  push:
    branches:
      - main
    paths:
      - "srcpkgs/**"
  pull_request:
    paths:
      - "srcpkgs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: docker
    if: "!contains(forgejo.event.pull_request.title, '[ci skip]') && !contains(forgejo.event.pull_request.body, '[ci skip]')"

    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged --platform linux/amd64
      env:
        FORGEJO_URL: https://code.hosaka.cc
        VOID_PACKAGES_REPO: https://code.box.hosaka.cc/github/void-packages.git
        XBPS_UPLOAD_TOKEN: ${{ secrets.XBPS_UPLOAD_TOKEN }}

    steps:
      - name: Prepare container
        run: |
          # switch to repo-ci mirror
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          # install dependencies
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git jq nodejs xtools
          # create non-root user
          useradd -G xbuilder -M builder

      - name: Checkout repository
        run: |
          git clone --no-checkout --filter=tree:0 "$FORGEJO_URL/$FORGEJO_REPOSITORY.git" .
          git config --global --add gc.auto 0
          git config --global --add safe.directory "$PWD"
          git fetch --prune --filter=tree:0 origin "+refs/heads/*:refs/remotes/origin/*"
          git checkout "$FORGEJO_SHA"

      - name: Setup void-packages
        run: |
          git clone --depth=1 $VOID_PACKAGES_REPO
          git config --global --add safe.directory "$PWD/void-packages"
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages

      - name: Find changed packages
        id: changed
        run: |
          if [ "${{ forgejo.event_name }}" = "workflow_dispatch" ]; then
            # manual trigger builds everything
            echo "packages=$(ls srcpkgs/ | tr '\n' ' ')" >> $FORGEJO_OUTPUT
            echo "deleted=" >> $FORGEJO_OUTPUT
            echo "Building all packages"
          else
            # build only packages whose template changed
            if [ "${{ forgejo.event_name }}" = "pull_request" ]; then
              base="${{ forgejo.event.pull_request.base.sha }}"
            else
              base="${{ forgejo.event.before }}"
            fi

            packages=$(git diff-tree -r --no-renames --name-only --diff-filter=AM \
              "$base" "${{ forgejo.sha }}" -- 'srcpkgs/*/template' \
              | cut -d/ -f2 \
              | xargs --no-run-if-empty sudo -Eu builder ./void-packages/xbps-src sort-dependencies \
              | tr '\n' ' ')
            echo "packages=$packages" >> $FORGEJO_OUTPUT
            if [ -z "$packages" ]; then
              echo "No changed packages"
            else
              echo "Changed packages: $packages"
            fi

            deleted=$(git diff-tree -r --no-renames --name-only --diff-filter=D \
              "$base" "${{ forgejo.sha }}" -- 'srcpkgs/*/template' \
              | cut -d/ -f2 \
              | tr '\n' ' ')
            echo "deleted=$deleted" >> $FORGEJO_OUTPUT

            if [ -z "$deleted" ]; then
              echo "No deleted packages"
            else
              echo "Deleted packages: $deleted"
            fi
          fi

      - name: Lint changed packages
        if: steps.changed.outputs.packages != ''
        run: |
          cd void-packages
          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "Linting $pkg"
            sudo -Eu builder xlint $pkg
          done

      - name: Restore hostdir repocache
        if: steps.changed.outputs.packages != ''
        id: cache
        uses: https://data.forgejo.org/actions/cache/restore@v5
        with:
          path: void-packages/hostdir/repocache-x86_64
          key: repocache-${{ forgejo.run_id }}
          restore-keys: repocache-

      - name: Prepare void-packages masterdir
        if: steps.changed.outputs.packages != ''
        run: |
          # set permissions again in case repocache was restored
          chown -R builder:builder void-packages

          cd void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Save hostdir repocache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: https://data.forgejo.org/actions/cache/save@v5
        with:
          path: void-packages/hostdir/repocache-x86_64
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Build packages
        if: steps.changed.outputs.packages != ''
        run: |
          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "Building $pkg"
            sudo -Eu builder void-packages/xbps-src -j4 -E -s pkg $pkg
          done

      - name: Sign and index packages
        if: steps.changed.outputs.packages != '' && forgejo.event_name != 'pull_request'
        run: |
          cd void-packages/hostdir/binpkgs
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem

          # sign newly built packages
          xbps-rindex --privkey /tmp/private.pem --signedby "Alex March" --sign-pkg *.xbps

          # download existing repodata that contains all previously registered packages
          $FORGEJO_WORKSPACE/scripts/forgejo.sh download x86_64-repodata || echo "No existing repodata"

          # add newly built packages to the index (updates existing entries if version is greater)
          xbps-rindex --add *.xbps

          # sign the updated repodata
          xbps-rindex --privkey /tmp/private.pem --signedby "Alex March" --sign .
          rm /tmp/private.pem

      - name: Remove deleted packages
        if: steps.changed.outputs.deleted != '' && forgejo.event_name != 'pull_request'
        run: |
          packages=$(scripts/forgejo.sh list)
          for pkg in ${{ steps.changed.outputs.deleted }}; do
            for match in $(echo "$packages" | grep "^${pkg}-"); do
              scripts/forgejo.sh delete "$match"
            done
          done

      - name: Remove old packages
        if: steps.changed.outputs.packages != '' && forgejo.event_name != 'pull_request'
        run: |
          packages=$(scripts/forgejo.sh list)

          for pkg in ${{ steps.changed.outputs.packages }}; do
            pkgname=$(xbps-query --repository void-packages/hostdir/binpkgs --property pkgname $pkg) || continue
            for match in $(echo "$packages" | grep "^${pkgname}-"); do
              scripts/forgejo.sh delete "$match"
            done
          done

      - name: Upload packages
        if: steps.changed.outputs.packages != '' && forgejo.event_name != 'pull_request'
        run: |
          for pkg in void-packages/hostdir/binpkgs/*{.xbps,.sig2}; do
            scripts/forgejo.sh upload "$pkg"
          done

      - name: Upload repodata
        if: steps.changed.outputs.packages != '' && forgejo.event_name != 'pull_request'
        run: |
          scripts/forgejo.sh delete x86_64-repodata
          scripts/forgejo.sh upload void-packages/hostdir/binpkgs/x86_64-repodata
          scripts/forgejo.sh link
